databases:
  - name: tcc-db
    plan: free
    databaseName: tcc_db
    user: tcc_user

services:
  - type: web
    name: tcc-backend
    runtime: docker
    repo: https://github.com/rabelismo/TCC-V1
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/modules
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tcc-db
          property: connectionString
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://tcc-frontend.onrender.com
      - key: PYTHON_COMMAND
        value: python
      - key: RENDER
        value: "true"

  - type: web
    name: tcc-frontend
    runtime: docker
    repo: https://github.com/rabelismo/TCC-V1
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://tcc-backend.onrender.com/api
      - key: RENDER
        value: "true"
