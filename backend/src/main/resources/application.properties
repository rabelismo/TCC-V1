spring.application.name=tcc-gr
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ─── PostgreSQL ───
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tcc_gdbl}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Railway provides DATABASE_URL as postgres://user:pass@host:port/db
# Use DB_URL to override with jdbc:postgresql:// format

# ─── JPA / Hibernate ───
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Server ───
server.port=${SERVER_PORT:8080}

# ─── JWT ───
jwt.secret=${JWT_SECRET:minha-chave-super-secreta-para-desenvolvimento-local-tcc-2025-pelo-menos-256-bits}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── CORS ───
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ─── Python Execution Safety ───
python.execution.timeout-seconds=${PYTHON_TIMEOUT_SECONDS:10}
python.execution.command=${PYTHON_COMMAND:python}

# ─── Flyway ───
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
