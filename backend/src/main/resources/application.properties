spring.application.name=tcc-gr

# ─── PostgreSQL ───
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tcc_gdbl}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Server ───
server.port=${SERVER_PORT:8080}

# ─── Python Execution Safety ───
python.execution.timeout-seconds=${PYTHON_TIMEOUT_SECONDS:10}
python.execution.command=${PYTHON_COMMAND:python}
