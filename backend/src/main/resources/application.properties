spring.application.name=tcc-gr
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ‚îÄ‚îÄ‚îÄ PostgreSQL ‚îÄ‚îÄ‚îÄ
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tcc_gdbl}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ‚îÄ‚îÄ‚îÄ JPA / Hibernate ‚îÄ‚îÄ‚îÄ
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ‚îÄ‚îÄ‚îÄ Server ‚îÄ‚îÄ‚îÄ
server.port=${SERVER_PORT:8080}

# ‚îÄ‚îÄ‚îÄ JWT ‚îÄ‚îÄ‚îÄ
jwt.secret=${JWT_SECRET:minha-chave-super-secreta-para-desenvolvimento-local-tcc-2025-pelo-menos-256-bits}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ‚îÄ‚îÄ‚îÄ CORS ‚îÄ‚îÄ‚îÄ
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ‚îÄ‚îÄ‚îÄ Python Execution Safety ‚îÄ‚îÄ‚îÄ
python.execution.timeout-seconds=${PYTHON_TIMEOUT_SECONDS:10}
python.execution.command=${PYTHON_COMMAND:python}

# ‚îÄ‚îÄ‚îÄ Flyway ‚îÄ‚îÄ‚îÄ
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
